name: Build Protobot-Rebuilt

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          lfs: true
          fetch-depth: 0

      - name: Cache Library
        uses: actions/cache@v4
        with:
          path: Library
          key: Library-Windows-${{ hashFiles('Assets/**', 'ProjectSettings/**') }}

      - name: Build Unity Project
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: '${{ secrets.UNITY_PASSWORD }}'
        with:
          targetPlatform: StandaloneWindows64
          projectPath: .
          buildMethod: BuildManager.BuildWindowsEXE
          unityVersion: 2021.3.5f1
          customParameters: -nographics
      
      - name: Build Installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "BuildScripts/installer_script.iss"

      - name: Upload Installer Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Protobot-Installer-Windows
          path: Output/Protobot-Rebuilt-Setup.exe
          retention-days: 30